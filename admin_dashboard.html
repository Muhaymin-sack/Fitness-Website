<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Fitness</title>
  <script defer src="auth-guard.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,900&family=DM+Mono&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Colors */
      --red: #BA181B;
      --white: #FFFFFF;
      --gray: #6C757D;
      --red-hover: #9b1315;
      --gray-light: #e9ecef;
      --ink: #0B090A;
      --surface: #F7F5F4;
      --card-bg: #FFFFFF;
      --border: #e2dfdd;

      /* Typography */
      --heading: 'Barlow Condensed', sans-serif;
      --body: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;

      /* Animation & UI */
      --ease: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      --radius: 4px;
    }

    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background-color: var(--surface);
      color: var(--ink);
      padding: 60px 20px;
      display: flex;
      justify-content: center;
    }

    .main-container { width: 100%; max-width: 1100px; }

    /* HEADER STYLING */
    header { text-align: center; margin-bottom: 70px; }

    header h1 {
      font-family: var(--heading);
      font-size: 82px; 
      text-transform: uppercase;
      line-height: 0.9; 
      letter-spacing: -3px;
      font-weight: 900;
      display: block;
    }

    header h1 .red-text { color: var(--red); display: block; }

    header p {
      color: var(--gray);
      font-size: 15px;
      margin-top: 20px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    /* GRID & CARDS */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: start;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      padding: 60px 45px;
      position: relative;
      border-radius: var(--radius);
      transition: border-color var(--ease);
    }

    /* Card Status Indicators */
    .card::before {
      content: '';
      position: absolute;
      top: 35px; left: 45px;
      width: 25px; height: 8px;
      background: var(--ink);
      border-radius: 1px;
    }

    .card.accent::before { background: var(--red); }

    .card-label {
      position: absolute;
      top: 33px; right: 45px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gray);
      letter-spacing: 2px;
      font-family: var(--heading);
    }

    .card h2 {
      font-family: var(--heading);
      font-size: 36px;
      text-transform: uppercase;
      margin: 25px 0 40px 0;
      letter-spacing: -0.5px;
      line-height: 1.0;
    }

    /* FORM STYLING */
    .form-group { margin-bottom: 30px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
      color: var(--ink);
    }

    select, input {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
      outline: none;
      background: transparent;
      border-radius: 0;
      color: var(--ink);
      transition: border-color var(--ease);
    }

    select:focus, input:focus { border-bottom-color: var(--red); }

    /* PRIMARY BUTTON */
    .primary-btn {
      width: 100%;
      padding: 18px;
      background: transparent;
      border: 2px solid var(--ink);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 4px; 
      cursor: pointer;
      transition: var(--ease);
      margin-top: 20px;
      border-radius: var(--radius);
      font-family: var(--heading);
    }

    .primary-btn:hover { 
      background: var(--ink); 
      color: var(--white);
      transform: translateY(-2px);
    }

    /* CALENDAR UI */
    .cal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .cal-nav h3 { 
      font-family: var(--heading); 
      text-transform: uppercase; 
      font-size: 22px; 
    }

    .cal-nav button { 
      background: none; 
      border: none; 
      font-size: 24px; 
      cursor: pointer; 
      color: var(--gray);
      transition: color var(--ease);
    }
    .cal-nav button:hover { color: var(--red); }

    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }

    .day-name {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 20px;
    }

    .day {
      aspect-ratio: 1;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      position: relative;
      border-radius: var(--radius);
      transition: var(--ease);
      font-family: var(--mono);
    }

    .day.empty { border: none; }
    .day:hover:not(.empty) { 
      background: var(--gray-light); 
      border-color: var(--ink); 
    }

    .event-indicator {
      width: 6px; height: 6px;
      background: var(--red);
      border-radius: 50%;
      position: absolute;
      bottom: 8px;
    }

    /* SCHEDULE LIST */
    .schedule-viewer {
      margin-top: 40px;
      border-top: 1px solid var(--border);
      padding-top: 30px;
    }

    .schedule-viewer h4 {
      font-family: var(--heading);
      font-size: 14px; 
      font-weight: 700; 
      text-transform: uppercase; 
      color: var(--gray); 
      margin-bottom: 20px; 
      letter-spacing: 1px;
    }

    .class-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid var(--surface);
    }

    .class-item:last-child { border: none; }

    .class-info b { 
      font-family: var(--heading);
      font-size: 18px; 
      text-transform: uppercase; 
      display: block; 
      line-height: 1;
    }
    .class-info span { 
      font-size: 12px; 
      color: var(--gray); 
      font-weight: 500; 
    }
    .class-time { 
      font-family: var(--mono); 
      color: var(--red); 
      font-size: 14px; 
      font-weight: 700;
    }

    @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="main-container">
  <header>
    <div style="display:flex; justify-content:flex-end; align-items:center; gap:12px; margin-bottom:8px; font-size:14px; color: var(--gray);">
      <span>Logged in as: <strong id="currentUserLabel"></strong></span>
      <a href="profile.html" style="background:var(--gray); color:var(--white); text-decoration:none; padding:8px 14px; border-radius:6px; font-weight:700;">My Profile</a>
      <button type="button" onclick="logout()" style="background:var(--red); color:var(--white); border:none; padding:8px 14px; border-radius:6px; cursor:pointer; font-weight:700;">Logout</button>
    </div>
    <h1>ADMIN <span class="red-text">DASHBOARD</span></h1>
    <p>Manage your fitness slots with ease. Every session updated here helps your members reach their peak strength.</p>
  </header>

  <div class="dashboard-grid">
    
    <div class="card">
      <span class="card-label">Slot Management</span>
      <h2>SCHEDULE SESSION</h2>
      <form id="slotForm">
        <div class="form-group">
          <label>Activity Name</label>
          <select id="activity" required>
            <option value="" disabled selected>Select Activity</option>
            <option>HIIT Class</option><option>Yoga & Pilates</option><option>Weightlifting</option><option>Boxing</option>
          </select>
        </div>
        <div class="form-group">
          <label>Trainer</label>
          <select id="trainer" required>
            <option value="" disabled selected>Select Trainer</option>
            <option>David Chen</option><option>Emily Rodriguez</option><option>Michael Brown</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Date</label><input type="date" id="date" required></div>
          <div class="form-group">
            <label>Time Slot</label>
            <select id="time" required>
              <option value="" disabled selected>Select Time</option>
              <option>09:00 AM</option><option>12:00 PM</option><option>05:00 PM</option><option>07:00 PM</option>
            </select>
          </div>
        </div>
        <button type="submit" class="primary-btn">UPDATE CALENDAR</button>
      </form>
    </div>

    <div class="card accent">
      <span class="card-label">Weekly Overview</span>
      <div class="cal-nav">
        <button id="prevBtn" aria-label="Previous Month">&larr;</button>
        <h3 id="monthLabel">May 2026</h3>
        <button id="nextBtn" aria-label="Next Month">&rarr;</button>
      </div>
      <div class="calendar-grid">
        <div class="day-name">Sun</div><div class="day-name">Mon</div><div class="day-name">Tue</div>
        <div class="day-name">Wed</div><div class="day-name">Thu</div><div class="day-name">Fri</div><div class="day-name">Sat</div>
      </div>
      <div id="daysGrid" class="calendar-grid"></div>

      <div class="schedule-viewer">
        <h4 id="viewerDate">DAILY SCHEDULE</h4>
        <div id="classList">Select a date to view classes.</div>
      </div>
    </div>

  </div>
</div>

<script>
  let viewDate = new Date();
  let scheduleData = {}; 

  function render() {
    const grid = document.getElementById("daysGrid");
    grid.innerHTML = "";
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    document.getElementById("monthLabel").innerText = new Date(y, m).toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m + 1, 0).getDate();

    for (let i = 0; i < first; i++) grid.innerHTML += `<div class="day empty"></div>`;

    for (let i = 1; i <= last; i++) {
      const dateKey = `${y}-${String(m + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
      const dayEl = document.createElement("div");
      dayEl.className = "day";
      dayEl.innerText = i;
      
      if (scheduleData[dateKey] && scheduleData[dateKey].length > 0) {
        dayEl.innerHTML += `<div class="event-indicator"></div>`;
      }

      dayEl.onclick = () => showClasses(dateKey);
      grid.appendChild(dayEl);
    }
  }

  function showClasses(dateKey) {
    document.getElementById("viewerDate").innerText = "SCHEDULE FOR: " + dateKey;
    const list = document.getElementById("classList");
    const dayEvents = scheduleData[dateKey] || [];

    if (dayEvents.length === 0) {
      list.innerHTML = `<div style="font-size: 14px; color: var(--gray);">No classes scheduled for this day.</div>`;
      return;
    }

    list.innerHTML = dayEvents.map(ev => `
      <div class="class-item">
        <div class="class-info">
          <b>${ev.activity}</b>
          <span>Trainer: ${ev.trainer}</span>
        </div>
        <div class="class-time">${ev.time}</div>
      </div>
    `).join('');
  }

  document.getElementById("slotForm").onsubmit = (e) => {
    e.preventDefault();
    const d = document.getElementById("date").value;
    const newEntry = {
      activity: document.getElementById("activity").value,
      trainer: document.getElementById("trainer").value,
      time: document.getElementById("time").value
    };

    if (!scheduleData[d]) scheduleData[d] = [];
    scheduleData[d].push(newEntry);

    render();
    showClasses(d);
    document.getElementById("slotForm").reset(); 
    // Minimalistic success feedback
    const btn = document.querySelector('.primary-btn');
    const originalText = btn.innerText;
    btn.innerText = "SUCCESS";
    setTimeout(() => { btn.innerText = originalText; }, 2000);
  };

  document.getElementById("prevBtn").onclick = () => { viewDate.setMonth(viewDate.getMonth() - 1); render(); };
  document.getElementById("nextBtn").onclick = () => { viewDate.setMonth(viewDate.getMonth() + 1); render(); };

  render();
</script>

</body>
</html>
