<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Fitness Website</title>
  <script defer src="auth-guard.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #0B090A;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background-color: #6C757D;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px;
      background: linear-gradient(135deg, #495057 0%, #2C2F33 100%);
      color: #FFFFFF;
    }

    .top-bar .left a {
      color: #FFFFFF;
      text-decoration: none;
      font-size: 14px;
      margin-right: 14px;
    }

    .top-bar .left a:hover {
      text-decoration: underline;
    }

    .top-bar .right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .top-bar .logout-btn {
      background-color: #BA181B;
      color: #FFFFFF;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
    }

    .top-bar .logout-btn:hover {
      opacity: 0.9;
    }

    .header {
      padding: 24px 30px 6px;
      color: #FFFFFF;
    }

    .header h2 {
      font-size: 26px;
      margin-bottom: 4px;
    }

    .header .subtitle {
      color: #E9ECEF;
      font-size: 14px;
    }

    .role-badge {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 10px;
      background-color: #BA181B;
      color: #FFFFFF;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-area {
      padding: 18px 30px 28px;
      color: #FFFFFF;
    }

    .section {
      background-color: rgba(0, 0, 0, 0.12);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .role-section {
      display: none;
    }

    body[data-role="members"] .role-section.role-members,
    body[data-role="trainers"] .role-section.role-trainers,
    body[data-role="managers"] .role-section.role-managers {
      display: block;
    }

    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #FFFFFF;
      margin-bottom: 10px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      padding-bottom: 6px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .form-row.single {
      grid-template-columns: 1fr;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 4px;
      color: #E9ECEF;
    }

    .form-group label .req {
      color: #FFD6D6;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    input:read-only,
    input[readonly] {
      background-color: #E9ECEF;
      color: #495057;
      cursor: not-allowed;
    }

    select {
      background-color: #FFFFFF;
      color: #212529;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    button[type="submit"],
    button.secondary {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button[type="submit"] {
      background-color: #BA181B;
      color: #FFFFFF;
    }

    button[type="submit"]:hover {
      opacity: 0.92;
    }

    button.secondary {
      background-color: rgba(255, 255, 255, 0.18);
      color: #FFFFFF;
    }

    button.secondary:hover {
      background-color: rgba(255, 255, 255, 0.28);
    }

    #message {
      min-height: 20px;
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
    }

    .error { color: #FFD6D6; }
    .success { color: #D4FFDF; }

    @media (max-width: 720px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="left">
        <a href="home_page.html">&larr; Back to home</a>
      </div>
      <div class="right">
        <span id="currentUserLabel"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="header">
      <h2>My Profile</h2>
      <p class="subtitle">View and update your personal information. Email and account type cannot be changed.</p>
      <span class="role-badge" id="roleBadge">--</span>
    </div>

    <div class="form-area">
      <form id="profileForm" novalidate>

        <div class="section">
          <div class="section-title">Account Information</div>
          <div class="form-row">
            <div class="form-group">
              <label for="fullName">Full name <span class="req">*</span></label>
              <input type="text" id="fullName" required />
            </div>
            <div class="form-group">
              <label for="email">Email (read-only)</label>
              <input type="email" id="email" readonly />
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-title">Personal Details</div>
          <div class="form-row">
            <div class="form-group">
              <label for="phone">Phone number <span class="req">*</span></label>
              <input type="tel" id="phone" placeholder="e.g. +44 7700 900123" required />
            </div>
            <div class="form-group">
              <label for="dateOfBirth">Date of birth <span class="req">*</span></label>
              <input type="date" id="dateOfBirth" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="gender">Gender</label>
              <select id="gender">
                <option value="">Select gender</option>
                <option value="Female">Female</option>
                <option value="Male">Male</option>
              </select>
            </div>
            <div class="form-group">
              <label for="address">Address</label>
              <input type="text" id="address" placeholder="Optional" />
            </div>
          </div>
        </div>

        <div class="section role-section role-members">
          <div class="section-title">Emergency Contact (Gym Safety)</div>
          <div class="form-row">
            <div class="form-group">
              <label for="emergencyContactName">Contact name <span class="req">*</span></label>
              <input type="text" id="emergencyContactName" />
            </div>
            <div class="form-group">
              <label for="emergencyContactPhone">Contact phone <span class="req">*</span></label>
              <input type="tel" id="emergencyContactPhone" />
            </div>
          </div>
        </div>

        <div class="section role-section role-members">
          <div class="section-title">Health Information (Optional)</div>
          <div class="form-row single">
            <div class="form-group">
              <label for="healthNotes">Allergies, injuries or conditions trainers should be aware of</label>
              <textarea id="healthNotes" placeholder="Leave blank if none"></textarea>
            </div>
          </div>
        </div>

        <div class="section role-section role-trainers">
          <div class="section-title">Professional Information</div>
          <div class="form-row">
            <div class="form-group">
              <label for="specialization">Specialization <span class="req">*</span></label>
              <select id="specialization">
                <option value="">Select specialization</option>
                <option value="Yoga &amp; Pilates">Yoga &amp; Pilates</option>
                <option value="HIIT">HIIT</option>
                <option value="Weightlifting">Weightlifting</option>
                <option value="Boxing">Boxing</option>
                <option value="Personal Training">Personal Training</option>
                <option value="Cardio &amp; Endurance">Cardio &amp; Endurance</option>
              </select>
            </div>
            <div class="form-group">
              <label for="yearsOfExperience">Years of experience</label>
              <input type="number" id="yearsOfExperience" min="0" max="70" />
            </div>
          </div>
          <div class="form-row single">
            <div class="form-group">
              <label for="bio">Bio (shown on your trainer profile)</label>
              <textarea id="bio" placeholder="Tell members about your background, qualifications and training style"></textarea>
            </div>
          </div>
        </div>

        <div class="section role-section role-managers">
          <div class="section-title">Work Information</div>
          <div class="form-row">
            <div class="form-group">
              <label for="employeeID">Employee ID <span class="req">*</span></label>
              <input type="text" id="employeeID" placeholder="e.g. MGR-001" />
            </div>
            <div class="form-group">
              <label for="department">Department <span class="req">*</span></label>
              <select id="department">
                <option value="">Select department</option>
                <option value="Operations">Operations</option>
                <option value="Customer Service">Customer Service</option>
                <option value="Finance">Finance</option>
                <option value="Marketing">Marketing</option>
                <option value="HR">HR</option>
              </select>
            </div>
          </div>
        </div>

        <div class="buttons">
          <button type="button" class="secondary" id="resetBtn">Reset</button>
          <button type="submit">Save Changes</button>
        </div>
      </form>

      <p id="message" role="status" aria-live="polite"></p>
    </div>
  </div>

  <script>
    const form = document.getElementById("profileForm");
    const message = document.getElementById("message");
    const roleBadge = document.getElementById("roleBadge");
    const currentUserLabel = document.getElementById("currentUserLabel");
    const resetBtn = document.getElementById("resetBtn");

    const isBackendOrigin =
      window.location.protocol === "http:" &&
      window.location.hostname === "127.0.0.1" &&
      window.location.port === "5000";
    const apiBase = isBackendOrigin ? "" : "http://127.0.0.1:5000";

    let originalProfile = null;
    let currentRole = "members";

    function showMessage(text, type) {
      message.textContent = text;
      message.className = type || "";
    }

    function setValue(id, value) {
      const el = document.getElementById(id);
      if (el) el.value = value === null || value === undefined ? "" : String(value);
    }

    function val(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function fillForm(profile) {
      currentRole = profile.role || "members";
      document.body.dataset.role = currentRole;
      roleBadge.textContent = currentRole;
      currentUserLabel.textContent = `Logged in as: ${profile.Name || ""} (${currentRole})`;

      setValue("fullName", profile.Name);
      setValue("email", profile.Email);
      setValue("phone", profile.Phone);
      setValue("dateOfBirth", profile.DateOfBirth);
      setValue("gender", profile.Gender);
      setValue("address", profile.Address);

      if (currentRole === "members") {
        setValue("emergencyContactName", profile.EmergencyContactName);
        setValue("emergencyContactPhone", profile.EmergencyContactPhone);
        setValue("healthNotes", profile.HealthNotes);
      } else if (currentRole === "trainers") {
        setValue("specialization", profile.Specialization);
        setValue("yearsOfExperience", profile.YearsOfExperience);
        setValue("bio", profile.Bio);
      } else if (currentRole === "managers") {
        setValue("employeeID", profile.EmployeeID);
        setValue("department", profile.Department);
      }
    }

    async function loadProfile() {
      try {
        const res = await fetch(apiBase + "/api/profile", { credentials: "include" });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          showMessage(data.message || "Failed to load profile.", "error");
          return;
        }
        originalProfile = data.profile;
        fillForm(originalProfile);
      } catch (err) {
        showMessage("Could not reach server. Make sure the backend is running.", "error");
      }
    }

    resetBtn.addEventListener("click", function () {
      if (originalProfile) {
        fillForm(originalProfile);
        showMessage("Changes reverted.", "");
      }
    });

    const PHONE_PATTERN = /^\+?[0-9 ()-]{7,20}$/;

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      showMessage("", "");

      const fullName = val("fullName");
      const phone = val("phone");
      const dateOfBirth = document.getElementById("dateOfBirth").value;
      const gender = document.getElementById("gender").value;
      const address = val("address");

      if (!fullName) {
        showMessage("Full name is required.", "error");
        return;
      }
      if (!PHONE_PATTERN.test(phone)) {
        showMessage("Please enter a valid phone number.", "error");
        return;
      }
      if (!dateOfBirth) {
        showMessage("Date of birth is required.", "error");
        return;
      }
      const dob = new Date(dateOfBirth);
      if (Number.isNaN(dob.getTime()) || dob >= new Date()) {
        showMessage("Date of birth must be in the past.", "error");
        return;
      }

      const payload = { fullName, phone, dateOfBirth, gender, address };

      if (currentRole === "members") {
        payload.emergencyContactName = val("emergencyContactName");
        payload.emergencyContactPhone = val("emergencyContactPhone");
        payload.healthNotes = val("healthNotes");
        if (!payload.emergencyContactName || !payload.emergencyContactPhone) {
          showMessage("Emergency contact name and phone are required.", "error");
          return;
        }
        if (!PHONE_PATTERN.test(payload.emergencyContactPhone)) {
          showMessage("Please enter a valid emergency contact phone.", "error");
          return;
        }
      } else if (currentRole === "trainers") {
        payload.specialization = document.getElementById("specialization").value;
        payload.yearsOfExperience = val("yearsOfExperience");
        payload.bio = val("bio");
        if (!payload.specialization) {
          showMessage("Specialization is required.", "error");
          return;
        }
      } else if (currentRole === "managers") {
        payload.employeeID = val("employeeID");
        payload.department = document.getElementById("department").value;
        if (!payload.employeeID || !payload.department) {
          showMessage("Employee ID and department are required.", "error");
          return;
        }
      }

      try {
        const res = await fetch(apiBase + "/api/profile", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
          showMessage(data.message || "Update failed.", "error");
          return;
        }
        showMessage("Profile updated successfully.", "success");
        await loadProfile();
      } catch (err) {
        showMessage("Could not reach server. Make sure the backend is running.", "error");
      }
    });

    loadProfile();
  </script>
</body>
</html>
