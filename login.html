<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Fitness</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #0B090A;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      min-height: 700px;
      display: flex;
      background-color: #6C757D;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .left-panel {
      width: 60%;
      background-color: #6C757D;
    }

    .left-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .right-panel {
      width: 40%;
      background-color: #6C757D;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .admin-box {
      width: 100%;
      max-width: 320px;
      text-align: center;
      color: #FFFFFF;
    }

    .admin-box h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      margin-bottom: 30px;
      color: #FFFFFF;
      opacity: 0.9;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    select {
      padding: 14px;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
      background-color: #FFFFFF;
      color: #212529;
      cursor: pointer;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 8px;
      background-color: #BA181B;
      color: #FFFFFF;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    #message {
      margin-top: 20px;
      font-size: 15px;
      color: #FFFFFF;
      min-height: 18px;
      font-weight: bold;
    }

    #message.error {
      color: #FFD6D6;
    }

    #message.success {
      color: #D4FFDF;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .left-panel,
      .right-panel {
        width: 100%;
      }

      .left-panel {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <img src="images/login.jpg" alt="Fitness Gym Image" />
    </div>

    <div class="right-panel">
      <div class="admin-box">
        <h1>Admin Portal</h1>
        <p class="subtitle">Assign a trainer to a member</p>

        <form id="assignForm">
          <select id="trainer" required>
            <option value="" disabled selected>Select a Trainer...</option>
            <option value="t1">David Chen (Strength & Conditioning)</option>
            <option value="t2">Emily Rodriguez (Yoga & Pilates)</option>
            <option value="t3">Michael Brown (Cardio & Agility)</option>
          </select>

          <select id="member" required>
            <option value="" disabled selected>Select a Member...</option>
            <option value="m1">Olivia Vance</option>
            <option value="m2">Leo Garcia</option>
            <option value="m3">Chloe Adams</option>
            <option value="m4">Max Sterling</option>
            <option value="m5">Mia Petrova</option>
            <option value="m6">Ben Thompson</option>
          </select>

          <button type="submit">Assign Trainer</button>
        </form>

        <p id="message"></p>
      </div>
    </div>
  </div>

  <script>
    function showMessage(element, text, type) {
      element.textContent = text;
      element.classList.remove("error", "success");
      if (type) {
        element.classList.add(type);
      }
    }

    document.getElementById("assignForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const trainer = document.getElementById("trainer").value;
      const member = document.getElementById("member").value;
      const message = document.getElementById("message");

      if (trainer === "" || member === "") {
        showMessage(message, "Please select both a trainer and a member.", "error");
        return;
      }

      // Shows success message and resets the form
      showMessage(message, "Trainer Assigned Successfully!", "success");
      
      setTimeout(() => {
        document.getElementById("assignForm").reset();
        message.textContent = "";
        message.classList.remove("success");
      }, 3000);
    });
  </script>
</body>
</html>
