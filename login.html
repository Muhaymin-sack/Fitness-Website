<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Website Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #0B090A;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      min-height: 700px;
      display: flex;
      background-color: #6C757D;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    .left-panel {
      width: 60%;
      background-color: #6C757D;
    }

    .left-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .right-panel {
      width: 40%;
      background-color: #6C757D;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .login-box {
      width: 100%;
      max-width: 320px;
      text-align: center;
      color: #FFFFFF;
    }

    .login-box h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .subtitle {
      margin-bottom: 30px;
      color: #FFFFFF;
      opacity: 0.9;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    input {
      padding: 14px;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 15px;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 8px;
      background-color: #BA181B;
      color: #FFFFFF;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .register-text {
      margin-top: 20px;
      font-size: 14px;
    }

    .register-text a {
      color: #FFFFFF;
      text-decoration: none;
      font-weight: bold;
    }

    .register-text a:hover {
      text-decoration: underline;
    }

    #message {
      margin-top: 15px;
      font-size: 14px;
      color: #FFFFFF;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }

      .left-panel,
      .right-panel {
        width: 100%;
      }

      .left-panel {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left-panel">
      <img src="images/login.jpg" alt="Fitness Login Image" />
    </div>

    <div class="right-panel">
      <div class="login-box">
        <h1>Fitness</h1>
        <p class="subtitle">Welcome back</p>

        <form id="loginForm">
          <input type="email" id="email" placeholder="Email address" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit">Login</button>
        </form>

        <p class="register-text">
          Don’t have an account?
          <a href="#">Register</a>
        </p>

        <p id="message"></p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const message = document.getElementById("message");

      if (email === "" || password === "") {
        message.textContent = "Please enter email and password.";
        return;
      }

      message.textContent = "Login form submitted successfully.";
    });
  </script>
</body>
</html>
