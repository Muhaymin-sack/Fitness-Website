<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Website</title>
  <meta http-equiv="refresh" content="0; url=./login.html" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B090A;
      color: #FFFFFF;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #6C757D;
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      line-height: 1.5;
      margin-bottom: 18px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #BA181B;
      color: #FFFFFF;
      font-weight: bold;
      padding: 12px 18px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Fitness Website</h1>
    <p>Redirecting to the login page...</p>
    <a href="./login.html">Go to Login</a>
  </main>
</body>
</html>
